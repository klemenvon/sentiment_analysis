repos:
  # Standard out-of-the-box hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files

  # Ruff linter and formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5 # You can update this to the latest Ruff version
    hooks:
      # Run the Ruff linter
      - id: ruff
        args: [--fix]
      # Run the Ruff formatter
      - id: ruff-format

  # Mypy for static type checking (optional but recommended for "the rest")
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        # Add any typed libraries you use heavily here so mypy can see them
        # additional_dependencies: [types-requests, pydantic]
